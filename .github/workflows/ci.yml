name: CI Pipeline - Run Tests

# Trigger the workflow on pushes to these branches and PRs
on:
  push:
    branches:
      - main
      - develop
      - ops/deployment-tests
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Ensure this matches your project's version
          cache: 'pip'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-mock

      # 4. Run Pytest with mapped environment variables
      - name: Run Pytest
        env:
          # --- Tells Python where the root 'app' folder is ---
          PYTHONPATH: "."
          
          # --- Database Credentials ---
          DB_USER: "postgres"
          DB_PASSWORD: "dummy_password"
          DB_HOST: "localhost"
          DB_PORT: "5432"
          DB_NAME: "test_database"
          # Using SQLite for the test runner to avoid needing a real Postgres server in CI
          DATABASE_URL: "sqlite:///./test.db" 
          
          # --- JWT Authentication Settings ---
          SECRET_KEY: "super-secret-test-key-for-github-actions"
          ALGORITHM: "HS256"
          access_token_expire_minutes_env: "30"
          
          # --- AI Configuration ---
          HF_TOKEN: "dummy_huggingface_token"
          
          # --- Frontend Integration ---
          FRONTEND_URL: "http://localhost:3000"
        run: |
          pytest tests/ -v