version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: retention_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_database_password}
      POSTGRES_DB: ${DB_NAME:-retention_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-retention_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retention_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Overriding DB_HOST to use the Docker network service name instead of localhost
      - DB_HOST=db
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../Retention-Decision-Dashboard 
      dockerfile: Dockerfile
    container_name: retention_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # So the Next.js client knows how to talk to the backend
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
    name: retention_pg_data