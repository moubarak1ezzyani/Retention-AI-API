version: '3.8'

services:
  # --- Base de Données
  db:
    image: postgres:15
    container_name: retention_db
    environment:
      - POSTGRES_USER=${db_user_env}
      - POSTGRES_PASSWORD=${db_password_env}
      - POSTGRES_DB=${db_name_env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d retention_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build: ./RetentionAI---Pr-dicteur-de-D-part-Assistant-RH-_BackEnd
    container_name: retention_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${db_url_env}
      - SECRET_KEY=${secret_key_env}
      - GENAI_API_KEY=${genai_api_key_env}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${access_token_expire_minutes_env}
    ports:
      - "8000:8000"
    volumes:
      # Permet le hot-reload si vous modifiez le code en local
      - ./RetentionAI---Pr-dicteur-de-D-part-Assistant-RH-_BackEnd:/app

  # --- Frontend Next.js
  frontend:
    build: ./RetentionAI---Pr-dicteur-de-D-part-Assistant-RH_Frontend
    container_name: retention_frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data: